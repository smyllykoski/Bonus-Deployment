name: Node.js CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests with coverage (c8)
        run: npm run coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login (simulated)
        if: false # prevents running while keeping the step in the workflow
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} # placeholder

      - name: Deploy to Azure Web App (simulated)
        if: false
        uses: azure/webapps-deploy@v2
        with:
          app-name: "placeholder-webapp"
          package: "." # would normally be a build artifact

      - name: Finalize
        run: echo "Azure deployment stage completed (simulation)"

      - name: Deployment summary (simulated)
        run: |
          echo "Azure deployment simulation complete"
          echo "If credentials existed, the build artifact would be deployed to Azure Web App."
